# Полный стек: postgres + minio (+init-bucket) + backend + frontend(builder) + nginx.
#
# Перед nginx-сервисом ставится host-уровневый reverse-proxy с TLS:
# host nginx терминирует HTTPS на :443 и проксирует на 127.0.0.1:${HTTP_PORT}.
name: showcase

services:
  postgres:
    image: postgres:16.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-showcase}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?need POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-showcase}"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?need MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?need MINIO_ROOT_PASSWORD}
    volumes:
      - minio:/data
    networks: [app-network]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Одноразовый init: создаёт бакет, если его нет
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      sh -c "
        until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
          echo 'waiting for minio...'; sleep 2;
        done;
        mc mb -p local/$$BUCKET || true;
        mc anonymous set download local/$$BUCKET || true;
        echo 'minio init done';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET: ${S3_BUCKET_NAME:-my-bucket}
    networks: [app-network]
    restart: "no"

  backend:
    build:
      context: ./showcase-backend
      dockerfile: Dockerfile
    image: showcase-backend:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # Datasource
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-showcase}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # S3 / MinIO
      S3_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-my-bucket}
      # OAuth — Azure AD (single-tenant). В dev-режиме можно оставить пустыми.
      AZURE_TENANT_ID:     ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID:     ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      # Dev-режим: статичная аутентификация по Bearer-токену вместо Azure OAuth.
      # См. showcase-backend/src/main/java/com/example/showcase/config/DevTokenAuthFilter.java
      APP_DEPLOYMENT_MODE: ${APP_DEPLOYMENT_MODE:-prod}
      DEV_AUTH_TOKEN:      ${DEV_AUTH_TOKEN:-}
      DEV_USER_ID:         ${DEV_USER_ID:-0}
      # Доверять X-Forwarded-* от host nginx — нужно, чтобы Spring строил HTTPS
      # redirect_uri в OAuth-флоу.
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      FRONT_ENV: production
      FRONT_URL: ${FRONT_URL:?need FRONT_URL e.g. https://showcase.example.com}
    networks: [app-network]
    # Порт наружу не публикуем — все запросы идут через сервис nginx.
    # Для отладки можно раскомментировать:
    # ports: ["127.0.0.1:8080:8080"]

  # Init-контейнер: собирает SPA в образе, на старте копирует /dist в shared volume
  # и завершается. Пересобирай (docker compose build frontend) после правок фронта.
  frontend:
    build:
      context: ./showcase-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # same-origin; nginx сам проксирует на backend
        VITE_DEPLOYMENT_MODE: ${APP_DEPLOYMENT_MODE:-prod}
    image: showcase-frontend:local
    volumes:
      - frontend-dist:/out
    networks: [app-network]
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started
    volumes:
      - frontend-dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${HTTP_PORT:-8081}:80"
    networks: [app-network]

volumes:
  pgdata:
  minio:
  frontend-dist:

networks:
  app-network:
    driver: bridge
