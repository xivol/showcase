upstream showcase_backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # Хешированные ассеты — кеш надолго
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # TODO для удобства вынести все роуты backend на /api
    location ~ ^/(api|admin|projects|project_tags|project_users|dates|roles|tags|tracks|users|permissions|role_permissions|user_accounts|start_page|oauth2|login|logout|swagger-ui|v3/api-docs|actuator)(/|$) {
        proxy_pass http://showcase_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Spring (server.forward-headers-strategy=framework) использует эти заголовки,
        # чтобы построить корректный HTTPS redirect_uri в OAuth-флоу.
        # X-Forwarded-Proto сюда придёт от host nginx уже как "https".
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $http_x_forwarded_host;
        proxy_set_header X-Forwarded-Port  $http_x_forwarded_port;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Всё остальное — SPA c history-fallback
    location / {
        try_files $uri /index.html;
    }
}
